body:
  text: 給事集巻二宋劉安上撰外制顯謨閣直學士知青州梁子野知定州中山巨屏控制朔陲維時藩宣必資夙望具官某智謀宏遠風力敏強曩膺簡求往鎮青社治譽之美達于予聞北道要藩謀帥尤慎選于邇列今曰汝冝爾其拊綏兵民布宣詔令體予徳意益壯逺猷顯謨閣待制知兖州郭照知青州朕視天下如一家視吾民如赤子豈以近而忘遠哉眷兹青社昔號全齊地冨以衍俗勁而強非得惠慈之長曷任牧養之寄具官某嘗以愷悌鎮魯郊以風績達朕聽聯職西清尹兹東土對揚明命益邁逺猷朝奉大夫閭邱籲除宗正少卿司宗亞卿實掌屬籍惟時俊彥乃稱簡求爾曩以才揚更厯兹任忠信篤厚發聞惟休衘恤去朝既終禮制俾還舊職允恊師言爾其辨昭穆之親踈奠世系之遠近惇叙訓廸咸得其宜則予汝嘉嗣有褒陟改瑖邱伯叔仲㑹為寧陽伯重邱伯公西輿如為北鄉伯先生書冊琴瑟在前猶戒勿越示有尊也夫子道為百世師今從祀弟子封爵之地乃斥其名于爾安乎爰命討論悉加改訂以稱朕尊仰之意徳州團練使提舉醴泉觀駙馬都尉石端禮為復州防禦使朕于攀附之臣雖不以愛暱而遂廢吾法亦不以私嫌而不録其功具官某不事綺紈深尚儒素蚤縁推擇祗奉禁嚴偹殫夙夜之勤寖厯嵗月之久宜繇團結進陟兵防往服異恩勿忘報稱資政殿學士知大名府梁子美為資政殿大學士知太原府并汾巨屏西北要衝式圖師帥之良宜得股肱之舊俾膺閫寄爰錫賛嘉具官某操履端方材猷宏博入參九政屢聞獻納之忠出殿大邦彌著循良之效勤勞中外朕所眷知兹陞秘殿之隆名改付晉陽之重鎮惟紀律嚴則可以䕶諸将惟威惠著則可以懐遠人益圖爾庸以永終譽樞宻都承㫖曹曚提舉崇福宫朕昭明國憲屏出邦朋惟伸威罰之行永示傾邪之戒豈容餘黨尚咈師言具官某紈綺小臣趍操猥下頃縁勲閥冐列華途有輕視君父之心有規壊國體之意比巨璫之斥逐乃平日之締交尚稽眀刑輙興異議肆騰稱譽之語實懐怨懟之私動揺輿情鼓惑朝論彈章交上詭迹悉彰雖朕欲容公議不可其解樞廷之屬尚仍真館之司内訟厥愆服我眀訓曹調罷大理卿提舉鴻慶宫任良弼罷大理少卿知宻州㳺百揆罷大理少卿知耀州廷尉天下之平也昔我神考董正治官議獄㫁刑悉歸大理其任可謂重矣茍用法而不知義狥勢而不知法天下安所取平哉爾為棘卿不思帥屬任良弼㳺百揆改為擢貳卿寺不贊官聯以患失鄙夫之心有迎合要權之意以縱弛為惠以苛刻為明刑獄紛張道塗怨讟果諠公議荐致煩言往奉真祠毋忘循實顯謨閣直學士知成徳軍洪中孚知永興軍迪上之徳意志慮莫切于侍從禁近之臣故出則殿侯藩撫民社必能任牧養之寄以寛朕之碩憂咸陽㑹府控制西陲兹擇師帥不敢輕畀具官某久翺翔于禁橐多輔弼于朕躬往鎮常山厥有休譽刑部郎中夏鰭除大理少卿具官某為郎粉署晉貳卿聯非止為爾序遷之榮也以爾敏于從政審于用律屢觀已試民以不寃故廷尉之事擢爾副之必能欽恤用刑期協中道往贊爾長以推廣予一人好生之徳則予汝嘉王革除大理正卿馬咸除大理少卿朕眀慎用刑哀矜庶獄期得哲人典司臬事以爾革守義不回擢長棘寺以爾咸治煩不擾往貳厥官惟一乃心惟公乃聽庶㡬天下無寃民以稱朕好生之意知汝州王旉加顯謨閣待制改知成徳軍常山巨鎮次對近班顧非老成不輕畀付具官某材猷宏博風力敏強使莭藩符更踐惟舊所臨底績發聞彌休輟自南昌昜帥真定西清秘職併示恩榮益懋爾庸寛予憂顧朝散大夫添差監歙州鹽酒稅周秩復直龍圖閣提舉洞霄宫威罰之權以馭臣下牽叙之典厥有故常爾曩以器能荐膺任使勿思毖慎自速罪辜兹從筦庫之微寵復文階之舊陞延華閣就畀琳宫體予異恩勿忘報稱河北路轉運副使侯臨移陜西路自陜以西列城數十轉輸之計允藉通才爾燕朝賜對占奏可嘉輟自朔方緫按關右均通食貨豐衍邦儲考覈吏能修舉衆職時汝之任往惟欽哉京西轉運判官趙㸃轉一官國家連被河患洛口建隄尤急爾以才揚佐漕畿右興此重役績用有成載嘉爾功進秩一等益思懋哉右司員外郎張叔夜罷職與監當都司之任紏正綱維儻慢令之弗䖍豈常刑之可逭爾曩由武弁昜置文階旋自府僚躐居宰屬比頒詔㫖申按攸司簿書勾稽漫不省察官吏縱弛不復誰何乃以虛文欺罔朕聽逮兹覆實姦偽了然宜從罷斥筦𣙜是司往路省循毋重尤悔户部員外郎李梲除右司員外郎爾服職省户能紏弊姦故擢爾為宰士以綱紀中臺往慎攸司益懋乃績毋使風采減于前司則稱朕意中大夫提舉洞霄宫許㡬責授永州團練使袁州安置罔上朋邪雖伸明罰原情定罪洊置嚴科以爾賦性庸回操心險愎潜交近習宻助巨姦每植黨以背公率懐諼而害政曩司邦計輙肆紛更隳摘山之制而嵗課頓虧建裁禄之議而廪賜悉減以至儲峙殫乏國用靡豐削刻至多怨咨殊甚迹其誤國實汝之由同時罪辜已皆竄逐尚叨真舘未厭師言往副州團體予善貸兩浙轉運副使莊徽加直秘閣朕分部置使以董轉輸不有甄陞曷功能吏以爾材質敏給識慮精深将漕全吳洊更嵗月冝時近效庸示寵褒聯職蘭臺增華使節往祗朕命其益懋哉中大夫直龍圖閣董正封為集英殿修撰兩浙轉運使朕分道置使以任轉輸又俾之察視郡縣以寄朕之耳目其選可不重哉爾長于吏治事任洊更衘恤去官亦既終制冝頒明命将漕全吳用陞書殿之華以增使權之重其無剥下媚上縱吏蠧民則稱朕意責授永州團練副使永州安置錢即復太中大夫徽猷閣待制知永興軍朕以八柄馭其臣法行自近不以一𤯝掩爾善期與維新矧居從槖之聯久掛刑書之末可無抆拭式對寵嘉具官某曩以才猷洊膺藩帥議行均糴之法未悉當時之宜原情已諒其匪他牽復孰云其可後寵還文秩就畀州麾聯職西清漸復青毡之舊分符右陜布宣紫詔之寛益圖爾庸以荅朕意職方員外郎李諤除著作郎眷惟著作之庭昔號羣玉之府非得直諒多聞之士曷從吾道山之逰哉爾奏對燕朝有嘉敷納輟自中臺亟遷東觀爾其毋怠思稱厥官徽猷閣待制知興仁府韓粹彥知定州中山巨屏控制朔陲惟爾之先常守兹土其民畏威懐徳刻石于今頌之具官某世濟厥美克守忠勤輟自近班分符輔郡閲時未久進昜帥垣爾其布宣敎條臥䕶北道庶無愧于前人以對揚朕之休命太中大夫徽猷閣待制知永興軍錢即改興仁府畿右名區曾為吾股肱郡非甘泉舊臣不與也具官某夙以譽望洊厯禁嚴起之廢閑分閫全雍爰申眀命殿此輔邦往祗厥服如在朕之左右朝請大夫集英殿修撰陜西路制置解鹽使何述為徽猷閣待制知永興軍具官某制置西陜鹽筴能調盈虛以足國用通有無以惠商賈上下不擾公私宜之是用寵以西清之次對往鎮全雍之大邦必能為朕牧養使賦平訟理民安俗阜如在西陜時則予汝嘉降授承議郎知衢州耿南仲為禮部員外郎兼定王嘉王府侍講春官禮樂之司命爾為郎非特以治器數資考訂而已也二王就傅俾司勸講蓋以禮樂入人者深而議論導廸者昜養其沖和日與之俱化矣以爾兼之朕意不有在乎勉思厥職嗣有寵嘉奉議郎符寳郎陳鍔兼定王嘉王府記室朕以二王出就外傅思得端亮之士日與之游以爾操履修潔議論純眀著作蘭臺掌符左省靖共有守譽處彌休爰錫命書俾司筦記爾其往叅輔導助成正徳使朝夕見聞罔有不正豈特資爾翰墨而已哉勉修厥官庸副朕意朝奉大夫直龍圖閣知亳州周穜轉一官部使者以守臣殿最為一路勸爾克共乃職嵗輸先集進秩一等尚益懋哉通奉大夫吏部侍郎姚祐降官天官之貳銓綜是司儻弗廸于官常固難逃于邦憲具官某頃繇推擇揚厯要途服在選掄不思紏察黠胥舞法並縁為姦貨賂公行擬授失當亟加研究灼見事情宜從降秩之科少示曠官之戒體予善貸思蓋前愆承議郎吏部員外郎蕭復降官爾服職銓曹不思毖慎黠胥舞法並縁為姦賄賂公行擬授失當宜從鐫褫以警曠瘝将仕郎編修國朝㑹典所檢閲文字方邵改承奉郎除秘書省校書郎蓬邱圖書之府名美秩清非修㓗博習之士不踐迹于其間爾秀而文奏對敷允寵昜華秩典校藝文士之知遇可謂榮矣其毋隳所守毋替所聞益懋逺猷以稱朕意知永興軍李譓責授團練副使安置誤國欺君臣之大惡原情定罪邦有常刑爾賦駔㑹之資挾穿窬之志交通近習黨附巨姦屢致私書屬託子姓彈章交上公論弗容曾未正于典刑輙妄陳于符瑞爰加考騐悉出厚誣為臣若斯忠義安在斥副州團之寄永為姦宄之懲張仲英等降官爾等並膺委寄協賛藩條不思秉義以事君輙復朋姦而罔上妄陳符瑞爾實與謀鞠治具孚可無懲戒褫官二等示我寛恩承議郎提舉京畿學事葉源改兩浙學事朕分遣使軺典司學事選用之慎必惟其人爾元豐名儒趨操純正屢將使㫖蔚有休稱宜自京畿往臨浙部爾其叨奨士類布宣詔條使成材衆多上副樂育則予以懌汝亦有辭降授朝請郎新陜西轉運副使侯臨加直秘閣寓直芸閣允謂清華資以勤能未嘗輕授爾頃繇推擇服在使軺克懋猷為所至可紀比緣昜地入覲燕朝聯職道山增華臨遣益圖顯效以報寵榮著作佐郎馮熈載為膳部員外郎自著作東觀列職春官可謂一時清選也以爾行藝著聞敷對忠亮俾以司膳豈曰逓遷蓋将歴觀爾之所能以就爾之逺業服我眀訓其益懋哉中大夫都水使者吳价轉官爵賞之設敦勸庶工惟時勞能宜被褒陟以爾材資宏美風力敏強曩膺簡求典司水政河隄之役績用有成羣吏奏功汝實提振肆攽渙渥增秩二階徃其欽哉服我休命都水使者吳玠為徽猷閣待制河北路都轉運使治財猶治水也行其所無事而已矣爾與司水政厥有俊功朔方飛輓命爾總之超陞次對之聯以寵皇華之使爾其洞䆒源流儲衍兵食國裕而民亦裕田里絶滯寃之嘆者是豈非以治水之道治財乎都水監丞葛仲良為都水使者都水掌河渠水衡之政令設使者以董治之非宿于其業習知其源流者不在兹選爾智材䟽敏夙夜瘁勤不負于丞具有嘉績是用命爾以長厥官往率其屬益獻厥成則稱朕意太中大夫致仕蘇轍追復端眀殿學士贈宣奉大夫朕紹述先猷聿懐故老凡刑章之罣誤悉牽復以優容矧獲令終可忘褒典具官某夙稟直諒逮事四朝晚厯險艱獨秉一莭處訏謨之地非堯舜不陳居退食之私以孟孔自樂宜永終譽式介壽祺歘爾訃聞良深震悼超進文階之峻寵還名殿之榮尚其幽靈膺此顯命殿中監髙伸殿中丞王遜轉官朕袛述先猷肇新殿省眷惟供奉之式比加編定之功宜有恩榮以示旌功具官某等曩因簡知服職御府六尚成書條理可考載疇爾庸寵進文秩爾其懋哉朝請郎祠部員外郎石景術提㸃京西北路刑獄宣徳郎提㸃京畿刑獄張閱為河北路轉運副使朕惟神考以民社之寄責之守令以守令之臧否責之部使者一時得人熈豐號為盛治肆朕紹述尤慎選掄以爾景術吏治詳敏故擢以河朔轉輸之寄各揚乃職督視一道上無蠧民之吏下無寃枉之民庶㡬同符熈豐以彰朕用人之眀尚書庫部員外郎葉劭為鴻臚寺少卿九卿之亞職任為優惟時鴻臚掌予賔客疇咨俊乂咸曰汝宜往惟欽哉毋替朕命顯謨閣待制提舉醴泉觀何述同為顯謨閣直學士西清秘閣謨訓所藏寓直其中秩隆地近惟時偉望克副簡求具官某學問修崇性資粹美揚于邇列朕所眷知書省編摩述勤備著祠宫涵養譽聞彌休矧條令之更新繫相臣之兼領有嘉勞績增峻寵名非特為爾父子之榮將以示吾君臣之美往祗茂渥益勵遠圖兵部尚書張閣為翰林學士北門學士地近職親不專潤色于訓詞實備顧問于左右選擇惟慎古今所同我得其人載頒休命具官某性資端亮學術髙眀文華足以代予言謀議足以㫁國論蚤由詞禁出殿大邦簡在予𠂻召長武部閲時未久譽望益隆爰稽考于師言宜寵還于舊物若夫逹制作之體要副燕閒之咨詢惟汝之能宜稱朕意翰林學士俞㮚為兵部尚書國家承平中外綏靖雖不貴佳兵豈以久安忘武事哉夏官之長實統五兵為萬里之折衝資文昌之長筭非體國老成曷以任此具官某剛而不撓静而有謀執法霜臺僅能閲月摛文翰苑多所弼諧用陞喉舌之司悉總武部之重勉修厥職為國逺猷顯謨閣直學士中奉大夫李孝壽復正議大夫朕于甘泉法從之臣極始終禮遇之厚雖以微文鐫秩豈拘于牽叙常法哉具官某天資粹眀吏治嚴整尹正畿甸風績著聞引疾祠宫姑遂退佚式頒眀命晉復官聯惟爾之休欽承無怠張諤除尚書户部侍郎邦計之重領于民曹必擇貳以佐其長使參稽登耗賛舉籌䇿庶乎上用裕而下不乏以爾揚厯中外眀習源流擢爾為郎兹為慎選爾其懋哉朝奉郎范之才為倉部員外郎尚書六曹聯職合治地官之屬尤在得人爾夙以才稱咸謂通敏比因奏對灼見器能爰錫命書列于司庾往慎厥官贊理邦計王灃閣門宣贊舎人列職宸閣允謂清華資以勸能未嘗輕授爾奉使屬部沉審有謀克獲凶渠安靖邉徼宜稍顯賞以旌爾功進陟新階典司宣贊為爾之寵往其欽哉髙堯舉張天材朕欲從政之士知法令之若江河申嚴律學選建官聯爾等咸膺推擇徃踐厥官或參訓導之聯或司紏正之任各祗乃事以觀爾能惠柔民朕建辟廱以處嵗貢之士增員闕以專訓導之職爾業眀行著咸曰汝宜其守所學尊所聞以稱朕樂育之意勾仲甫除荆湖北路提㸃刑獄荆湖之北控制諸蠻物夥事繁獄市昜擾肆求望碩往按祥刑爾曩以才揚嘗厯方面罷斥滋久能務省循朕不汝棄就畀使軺益圖厥修副予欽恤宗室仲遷贈開府儀同三司眷惟邦國之華允藉本支之茂愓聞永逝敢後彛章具官某廸徳粹溫秉心端恪悅詩書而務習處冨貴而不驕洊膺惇叙之仁寖陟清華之列奉朝惟謹率履無違著好禮之美稱得為善之最樂云胡不淑罹此閔凶宜隆褒䘏之恩以極哀榮之寵啓封大國視秩冢司尚其如存服我眀命宗室叔混贈開府儀同三司祖宗之世並建親賢以固磐石之基以茂本根之勢故生則不閔勞以事而冨禄之殁則軫卹其後而褒崇之始終之義備矣具官某秉樂善之資服仁厚之化屬籍最長遷于庶察之聯髙朗令終享此太平之福寵開榮國峻視宰司泉路有知歆承無斁胡奕修復職朕待遇臣工務從寛假獲與甄陞之典曾何存殁之殊具官某曩以時才洊更事任将漕六路宣勞實多惜其淪亡嘗加褒贈中縁褫奪亦既累年原情念勞宜從矜貸其家籲訴達于朕聞特還内閣之華仍賜後昆之慶尚其不昧歆此寵榮横行皇城使皇城副使等换官朕遹駿先猷肇修武選是正官稱之美以為在服之榮具官等夙以才揚久祗予采乃眷横班之峻或作崇階之寵允為右列之華宜從新書用頒明命尚慎爾止毋或勿欽中奉大夫直龍圖閣知杭州龎寅孫轉官朕公考績之法以馭群吏雖在䟽逖不廢褒崇矧吾邇臣厥有彛典具官某才猷明敏識慮精詳曩以才揚踐更中外比領西清之職出綰錢塘之符風績著聞譽望休顯有司㑹課應令當遷俾增峻于文階其往祗于寵渥姚宏轉防禦使再任邉郡守帥簡自朕心矧著勞績疆埸帖然其可数昜而撼動我邉民哉爾久分符竹隠若長城宜繇團結之聯躋于禦侮之列仍綰舊紱益既乃心張竦轉官夫為郡太守而能譏察姦萌使不得作可謂才矣爾守淮安降羌搆謀隂圖竄逸以智俘獲卒服其辜朕何愛一官不以為汝賞哉肆頒寵命往其欽承路某轉官新造之邑爾能勞來拊循其民俾安厥官時乃之功可忘褒勸進秩二等懋哉王華降官爾綰郡章不思牧養乃倚法以任情黷貨以豐已朕不能慎擇于始彼千里之民何辜焉試加核實具有寃狀聊從鐫秩筦𣙜是司尚其循省以蓋前愆王子猷胡景修降官民吾赤子而畿縣尤所重爾玩法縱囚長姦害民朕何頼焉姑削一官是為寛典張閱賈君文降官部使者以紏察吏治為職况按刑之司在畿甸之邇乎爾等咸以時才擢将使指屬邑玩法連逸重囚爾于平時曾不按察逮其已然乃始究治失刑縱惡誰之過歟姑從降秩以警曠瘝侯渙開封府士曹參軍都邑翼翼四方是則治稱浩穣其可以常才冐試乎以爾資識敏明應機必决曩膺推擇服職佐僚爰錫命書俾遷厥次往贊而長益懋爾修劉法散官安置朕恢崇學校丕變寰區故雖遐陬敎法惟一儻懐阻壊難逭典刑具官某頃以常才濫居師席弗思體國遵奉詔條而乃託公逞私規害學政陵轢士類輕侮憲章無享上之誠有怙終之實師紳若此朕何望焉其褫兩使之榮資仍解河湟之重寄屏之遠服聊示竄投體我寛恩毋忘自訟將校降官傷人抵罪里巷自好者不為也爾身領將麾乃弗知戒任情悁忿自貽厥愆褫秩一階往其循省燕國静恭思懿淑慎夫人薛氏改封越國并加莊穆二字朕詳求淑徳參侍宸闈顧非宫壼之英曷稱號名之美某氏稟資端静廸徳粹溫柔嘉夙著于令猷恪謹動循于禮則自膺異數益懋閎休志意修而不渝寵禄至而愈慎宜頒渙渥進陟大邦惟莊則肅而有儀惟穆則和而靡懈併兹顯號式廣徽稱往服寵光永綏多福某氏衞國夫人朕詳求淑徳參侍宸闈惟時禁掖之良爰錫褒遷之命某氏稟資端静飭已惠和恪勤克敏于事為恭順動循于禮則自䟽封于名郡已藹著于英聲朕所眷知宜有甄陟進加大國之寵以新象服之榮益懋令儀用對休渥孟惟彥降官爾負三世之傳虧十全之效是怠吾事宜削二階楊昌父贈莭度使朕親祠泰壇薦饗上帝既荷休于穹昊遂均賚于庶邦惟予禦侮之臣厥有追榮之典具官某故父某夙推恭順克保遐荒籍輿地以自歸率遵文敎襲衣冠而效職永捍藩維篤紹世勞實有賢子曩被餙終之寵洊陞畱務之榮屬釐事之告成廣慶恩而遠浹增崇位叙進領莭旄尚其如存服此顯命母某氏贈郡夫人祗見上帝均慶羣工維時愍章厥有彛典具官某氏稟資端懿廸徳惠和嬪于令門克有賢子忠勤夙著品秩增崇宜䟽大郡之封進陟小君之號尚其幽壤歆此寵光妻某氏封郡君釐事告成庶邦共慶惟時恩典厥有彛章具官某妻某氏柔嘉有儀淑慎爾止率循内則克相厥夫服職忠勤致位通顯宜膺渙渥進陟郡封尚其欽承服我休命張夏封寧江侯生能有功于人殁而可祭于社者其斯人歟爾在先朝將漕淛部江濤為患剏建石隄回遏怒瀾逾七十載民頼其利朕所嘆嘉爰錫贊書寵之侯爵尚其歆懌永庇此方長源侯山川之神能以休澤庇覆其民者朕咸秩而祀之况漢水之神其可後乎惟神實紀南國廟食一方有禱輙從民不告病宜新爵號以寵神休尚其居歆永庇兹土給事集巻二
