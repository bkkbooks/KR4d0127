body:
  text: 給事集卷五宋劉安上撰經義以肺石達窮民天下之禍本于下情之不通而王政之施常患幽隱之不逹古之所謂至治者無他焉為人上者惻怛之誠及于無告而無告之民皆得洞見肺腑而無疑夫使四海之內皆無隱哀而無有不告者亦可以見先王仁政之周也故曰以肺石逹窮民蓋一人之身思慮隱于無形而肺腑無得見于外者也思慮鬱于內則其情不得通肺腑洞于外則其情無不達窮民天下之無告者也可謂下情之難達者矣今也立之肺石以求其辭先王豈以是肺石干譽于百姓也其意有在矣昔堯之有天下也不虐無告不廢困窮夫困窮無告之民堯皆勿虐而弗廢之故舜之紹述也是以發政而不窮其民焉然舜亦豈俾斯民之不窮哉要使窮者各得其所是乃所以不窮之也文王號一代發政施仁之令主而文王亦不能使夫鰥者之有婦寡者之有夫孤者之有父獨者之有子也仁政發而四者皆優遊以卒嵗此文王所以無愧于堯舜也方成王之有天下周公為之左召公為之右所以佑翼其君者思欲無歉于堯舜無忝于乃祖則肺石之設豈可一日廢哉蓋嘗謂有天下者猶之一身一家也癢痾疾痛之切其身者愛其身者必求所以救之療之一人向隅而不懌愛其家者必求所以悅之懌之仁人之于天下視民之無告者必求所以撫之綏之且常人之情厄窮則呼天疾痛則呼父母君之于民覆之如天愛之如父母使無辜者則必聞而訴之者必見恤四海之內無隱不達則聖人仁民之心于此固已盡矣雖然仁義不施則韶濩之樂不足以格天忠信不立則鄉射之禮不足以措刑政事不修則雖有肺石不能致海內之無窮民政事者其本也肺石者其末也不揣其本而齊其末則心雖日勞而實不應有天下者執其本以修之則無窮民之弗逹也雖然本既立矣而末亦烏可廢哉以其餘為羡經略之內孰非王土食土之毛孰非王民六尺以上其賤者皆可籍而任數口之家其壯者皆可致而使然先王雖有廣土其制比伍則內不過六鄉雖有衆民其起徒役則家不過一人故家有羡卒人有餘力蓋師旅者先王所以平禍亂不可去也力政者先王所以治城郭宫室不可弛也然驅民以死地莫大于師旅使民以窮苦莫甚于力政民之所不欲在斯二者又何可家起二人以重困之乎何則人情莫不欲安佚也而上勞之如此則亦必莭其力而不敢盡焉夫民之生自幼至老大莭有三幼之時血氣未定老之時血氣即衰乃若旅力方剛而氣幹未衰者少壯之時而已是故一家之中其可任者寡其不可任者多老幼者常七之四而少壯者當居五之二此上地七人中地六人下地五人之家而以或家一人或家二人或二家五人為可任者也冒矢石擊刺攻伐于行伍之中而事父母養老疾于家者其事不闕也有其餘以為羡故也荷畚挶度築削于鼛鼓之間而稼穡植藝戴茅蒲被襏襫于田野者其職不廢也有其餘以為羡故也夫然故從事于師旅者蹈死斷首而不辭摧鋒爭先而不避也從事于力政者子來而不待率鼓之而不能勝也昔公劉居豳土地未闢人民未阜而羡卒有闕也故其詩曰其軍三單是非有異乎周之治官也時焉而已及宣王命方叔率南征之師而有其車三千之多是非空六鄉之地而起之也諸侯以師會焉故也而老儒以為羡卒盡起是烏識先王以其餘為羡之法可謂明也已矣可謂逺也已矣天下君子少而小人多賢者寡而愚者衆夫惟多少衆寡之勢若不相敵此賢人君子所以多至于危殆也且以小人之心固嘗忌君子矣君子者介然自守不與小人合小人又加怨焉挾忌怨之心則無時而不謗小人者必為詭辭飾説自欺其心以入于人然則茍非至明深智了然昭徹其賢人君子不為致疑者幾希甚矣小人為難察也君子立人之朝小人未嘗不欲擠而去之君子蓋寡過也無可誣之行雖善毁者不得入無可乘之釁雖善讒者不見信故小人者必伺其有疑似之隙而投之君子有引賢授能者則進朋黨之説矣有造功興事者則進擅權之説矣有理財厚民者則進聚斂之説矣小人之欲用也無顯顯之德患位之不保無赫赫之功患祿之不固以踈逺之迹一旦得其君也甘心巧語柔顔佞色伊媕阿諛趨附機會未嘗有絲髮之善而矯飾百端以中主欲幸而詭説一開則寵任盤固不移如山矣有人于此焉其端崖不測茍以是心至者皆絶人于微使不得逞若然可不謂之明且遠乎子張問明孔子告之以浸潤之譖膚受之訴不行焉可謂明也已矣可謂逺也已矣豈非是乎莫非明也舜之舉四嶽十二牧十六相則任之而不疑至四凶之誅則使之不得售其姦舜之明豈不遠哉成王之任周公召公毛伯芮伯左右前後未嘗有間至管叔蔡叔則不以親而私成王之明豈不逺哉仲尼之為司冦也未幾以少正邜至隱之惡七日而手足異處于兩觀之下仲尼之眀豈不逺哉此三君子者豈世之所謂辨白黑數一二覩輿薪而謂之明者乎書曰視逺惟明此之謂歟子溫而厲柔失己剛失人一偏之患也知柔之為患而矯之以剛則失人之患復至矣知剛之為患而易之以柔則失己之患復至矣惟二者之偏勝而中和之道卒不可得此君子之道所以鮮有聞於天下也然則接物以柔而不失其所以為剛之道非聖人疇克然哉蓋溫猶水之溫也有可親之義焉厲猶山澤之禁也有不可犯之義焉夫可親之與不可犯疑于不侔矣而聖人一之者本于道也道之為道交物而不失于物故以道逰世者雖天地且不能違之而况于人乎是故暖然似春者其與物接也凜然似秋者其不可犯以非禮也與物接者聖人所以為人而不可犯以非禮者聖人所以不失己也陽貨之見夾谷之會公山之召以衆人觀之可以不屑矣而薰然之慈方且與之揖遜而不辭此聖人接物之仁也然其卒也遇塗之言不能屈以非事厯階之説不可犯以非禮而堅白之實乃不可得而磷緇焉是豈有山澤之禁兵甲之守使人可親而不可犯者哉正容以悟之而人之意固已消矣子夏曰君子有三變望之儼然即之也溫聽其言也厲蓋所以形容其德者也若夫栁下惠之和也觀其不昜介于三公亦可謂不失守矣然援而止之而止至于裸裎其側而不悔者雖曰人不我凂然而不恭亦甚矣故其弊也人忽乎已而招侮召辱或未免于冶容之誨焉故孟子以孔子為盛德之至而以栁下惠為不恭真知言哉請問其目道無問問無應古之人有目擊而道存者不必語而默會此上智忘言之士也若夫善學者則不然問不切則理不明理不明則無以釋疑而辨惑故學者必貴乎問問者必貴乎切切問者以其要而叩焉者也昔者顔子學于夫子平居燕間所以觀聖人視聽言動睟然之容與夫泠然之音其著心入目得之于言意之表者固非一日也然克己復禮之説尚且不自以為曉逹而請問其目于此見顔子之善學而知切問之為大也豈諸子之倫哉嗚呼學道者將以探聖人户室而造其閫奧者也目如門焉問則得其入不問則不得其入然而善學者亦由其門而求之而已此顔子問為仁之端而以目言之也嘗觀聖人之門學者多矣然善問者鮮焉非不問也不得其門而問之也顔子之下善問者莫如子貢或人以衛君為問而子貢以伯夷叔齊問于孔子子曰伯夷叔齊古之賢人也求仁而得仁又何怨子貢知夫子之賢伯夷叔齊遽知其不為衛君者知其是此而信其非彼無疑也夫欲知衛君之事而以伯夷叔齊問之能以其類推之也子路問魯大夫練而牀禮乎夫子不答子路疑之三問而三不應子貢入而問曰練而牀禮乎曰非禮也子貢出謂子路曰汝問非也禮居其邑不非其大夫若子貢者亦可謂能問者矣然未若顔子之能切問也夫為仁非一端故顔子以目為問子曰非禮勿視非禮勿聽非禮勿言非禮勿動視聽言動學者所由以入道也能制于外者則能養其中能養其中仁之道立矣宜乎聖人告之以此陳善閉邪謂之敬君子之事君盡心焉耳矣言而不心則近諛貌而不心則近佞諛且佞君子不為也故盡吾心之所可欲者以事君則凡所謂善者無不陳也盡吾心之所欲去者以事君則凡所謂邪者無不閉也陳善閉邪此人臣之所自盡者得不謂之敬乎竊嘗謂人之立乎本朝者豈皆出于愛君之誠也哉貪夫爵慕夫祿其未得之也則諛言柔色以入之其既得之也則又諛言柔色以守之不為是者或以財利説其冨國或以勇力説其強兵不為是者則為盤樂奢泰説其樂逸是三者君以為忠臣以為賊者也彼其心豈不知好利足以虐民好兵足以害國而盤樂奢泰之不足以保其社稷也特其心不出于愛君之誠是以若此然爾其不敬莫大于是嗟乎孟子之時兹弊甚矣天下之士亦孰知有愛君之道哉蓋其獻言于君者不過曰我能為君闢土地充府庫而已又曰我善為戰我善為陳而已當時之君不知其非且從而尊之曰此良臣也而孟子者乃眀其説之不可獨區區以仁義為説彼好勇也我以文武言之彼好貨也我以公劉言之彼好色也我以太王言之是皆所以引其君以當道而格其心之非則其敬君為何如哉彼景子方且以不朝王為言是烏知孟子之所以敬其君者不在于聲音笑貌之間而在于中心之誠故曰齊人莫如我敬王也居之安學不至于自得者未足與言不惑智不至于不惑者未足與言不變惑者不眀變者不守若然者其于道也而能一朝居之乎孟子曰居之安凡欲其自得之也蓋所貴乎得者非貴乎得于人也自得而已矣茍惟得人之得而不自得其得則其所得亦將因人而變矣昔者門人拱而尚右此信于孔子之行而行之者也喪欲速貧死欲速朽此信于孔子之言而言之者也及本之聖人之意未有不轉彼而為此矣若是者亦可謂居之安乎孟子曰聖人復起不昜吾言矣其居之安莫大于此守先王之道道在一介則一介重道在天下則天下重方周之衰先王之道不行于天下而獨在于孟子夫軻也雖一介之士而道實在焉則當時推重無過于孟子矣天下其敢不異禮而待之乎嗚呼道之不行也久矣道不行則天下無善治道之不明也久矣道不眀則千載無真儒無善治是先王之道不及于斯民矣無真儒是先王之道又不傳于學者矣當孟子時堯舜文武之道不幸而不行于天下幸而有孟子者得先王之道而傳之夫先王之道上足以帝王其君下足以帝王其民雖三公之尊未足以為貴也九鼎之養未足以為冨也王公大人分廷抗禮區區傳食何足以為泰乎彭更以諸侯待孟子為泰是以待先王之道為泰也如彭更者非特不知尊孟子且不知尊先王非特不知尊先王身為儒者忍發此言是不知所以自尊也曾子曰尊其所聞則髙明矣其言如此器局可知卑陋狹隘何足以稱于大人君子之門嗚呼更也亦知世有所謂舜者自畎畝而為相乎世有所謂傅説者自版築而為相乎何其淺見寡聞也孟子之言真有以大其志為彭更者將下大禹之拜乎抑將學臯陶之師乎回之服膺師之書紳乎宜知所以自處附録行狀公諱安上字元禮姓劉氏系出彭城世為永嘉人曾祖延貴祖瑩父去非以公貴纍贈正議大夫公少端重有成人風祖父特所鍾愛曰異時必大吾門與從兄舍人安莭同研席相友愛尤専勤嗜學講誦忘寢食既長俱以文行稱公踰冠首鄉薦復聯名遊太學並為上舍生迭預魁選聲稱籍甚號二劉一時賢士慕向爭與之交赴省闈列試第二人登紹聖四年進士第丙科解褐調杭州錢塘尉公操履清峙輝映湖山人謂真仙尉謹身律下每被檄所部雖庖必自辦以行秋毫不以市于民所憩唯亭傳僧藍否則茇舍露坐食息自如見者咨美之受代留圭租縣廩為後人冒請暨還過之雖久客寠甚勿問也公以名流陸沉下僚怡然無忤色究心職事有捕獲功未嘗自列曰幸人之死而已取賞吾弗忍為雖同列以是被遷不以屑意卒用薦者升處州縉雲縣令除登州州學教授時舍法初行精擇師儒國學尤極其選遂遷博士學行德器尤為後進尊仰差考試貢士舉院故事考官各進策問取旨上皇咨重公文親筆選用以車駕幸學恩授儒林郎復改宣德郎大觀九年除提舉兩浙學事陛辭進對風度詳雅論事合旨既退上皇顧近弼稱其蘊藉有大臣體屬中丞余深薦之留為監察御史朝廷有所推鞫多以屬公公持法尤審而根于誠恕吏不忍欺讞議明允多所平反囚悅服無恨意十一月遷殿中侍御史常曰偷安患失尤非言官所宜故居處薪芻服用之物取供朝夕十二月磨勘轉奉議郎眀年用八寶恩轉承議郎三月遷侍御史賜五品服公沈厚謹密凡風聞事皆反覆詢究或遣親人參驗得實乃始論列舉無不當一日奏事上皇目送之曰劉某言事可謂詳審矣屬時相擅政竊㺯威福凶熖滔天意所趨向海內風靡黨與蟠結根據朝廷無敢攖其鋒者公獨挺然不肯附阿極言其罪抗章不報乃與石公弼率同列廷論之詞旨剴切時論偉之在言路三年凡所彈射皆汙穢不法敗政亂俗之尤者其不畏強禦如此平居恂恂若不能言至論辨人主前安詳不撓無所畏避以故眷注愈渥三年八月遷諫議大夫逾月丁太碩人憂公性純孝未冠正議公即世掩泣腐袂奉事太碩人色養尤篤自筮仕以至禁從榮侍板輿夙興溫凊奉甘脆供笑樂始終如一日至是毁瘠幾滅性卜葬盡禮極哀榮之奉廬于墓側手蒔松檟蔬食終喪徘徊不忍去始公生于里之西洲及先人既亡宦遊往來經行其處必凝望泣下人以為有終身之慕政和冬服闋以中書舍人召先是兄舍人由察官登對玉音宣問公安否及寓止何地既朝見入對上皇面諭以曩日詢訪及簡記識擢之意二年用元圭恩轉朝奉郎踰年除給事中其所獻納論駁有補時政者甚多俄請外甚力九月除徽猷閣待制知壽州四年以上舍試所差官撰號差互罷提舉亳州明道宫復以磨勘轉朝散郎封文安縣開國男食邑三百户五年除知婺州七年磨勘轉朝請郎進封開國子加食邑二百户時六尚書降造花羅數額頗衆督程甚嚴公以抑配多民困論乞蠲減弗克則奏以非土貢願不為例又部使者往往專事花石以市恩寵州縣希旨幸賞或遣使臣檄州計置督以支錢應副舟乘事公初不與之辨但按法移文回報往復閲時淹久使臣苦之逡巡引去自是無來者遂免無名之費調發之擾民隂受賜焉尤不喜笞辱人少年或坐公法察知良家子資可教則命其父夏楚于庭責使就傅其務教化厚風俗蓋有古循吏風治婺凡三年鎮撫惠養百姓德之里人過其境詢及遺愛則人人以手加額至今稱頌八年移知邢州時祖母徐氏無恙年餘九十奉之甚謹初遇恩妻張氏當封以祖母未命避遜不敢當奏乞回授上皇嘉其意優詔從之封仁壽縣太君念諸父蚤世而徐氏年彌髙邢去親庭益逺遂丐宫祠侍養宣和元年六月得請提舉建州武夷山沖佑觀九月丁太孺人徐氏憂公以介孫承重送終恩禮有加鄉閭榮之三年服闋除知壽春府纍表辭免不克四年磨勘轉朝奉大夫進封開國伯加食邑二百户壽公舊治民懷恩勿忘及此再至老稚欣迎扶携逺迓者屬路府于淮西大藩屯兵餘萬密邇京師每嵗上供十二萬石應制副畿縣軍糧且稱是雖遇凶歉租賦放免殆盡而稅額不少減前此官吏復加槩量反羡餘以幸茍免民重困流移者衆公至嘆曰奈何剝下以逃責邪凡諸司額外泛派一切不應専以撫綏寬恤為事漕臣俞賙奏乞較一路上供及支移之數課殿最行賞罰以風屬郡是嵗壽春官吏遂以數劣被劾降官復以舂發軍糧虧欠再被削秩以去終不自辨也六年除知舒州踰年請宫祠從之提舉南京鴻慶宫靖康元年覃恩轉朝請郎加食邑二百户尋復朝奉大夫朝散大夫以疾丐致仕轉朝請大夫建炎二年正月終于正寢享年六十詔贈通議大夫命有司量助喪事卜以十一月壬寅葬于永嘉縣建牙鄉玉清觀後山公識度粹凝宗工巨儒見者莫不許以遠器自為尉以學官薦者十餘人守帥豐公稷皆譽推奬禮宴集則分韻賦詩講論文義延留彌日不以僚屬待也大觀初令侍從各薦所知右丞徐公處仁以公應詔其為當路知遇如此素堅正靜退未嘗茍進取部使者或欲縻公致門下寄聲知舊諷使致謁公薄其為人終不詣之尤不喜竿牘為教官登州或勸貽書時貴丐東南便親者公謝勿願也暨間居里閈當軸皆其知舊或請致賀答曰吾平時不通書今遽賀之得無疑我有求邪時俗持祿養交率顧望迎合以規進取公深鄙之為御史多所彈劾務存大體振綱紀不為訐直取名凡論列章疏退輒削藁雖家人子弟無得見之故其奏議人少知者嘗語人曰在言路久仇怨殆滿目矣然吾職風憲獨安所避顧在我本無心耳出典三郡凡所設施不務表暴示以好惡而人自化御下寬簡不苛吏卒服役之餘咸許自便然嚴重叵測莫敢慢也或乃為投合以求當公意終不可入殆所謂昜事難悅者動凖繩檢進止有常度而遇事裁決咸中理解所居有惠政在婺市田以給浮橋費民便之刻石紀德其守壽春屬比郡嵗飢流民襁屬公為區處舍止什器資養畢具至者如歸屢丐常平賑濟弗許則倒廩散之曰民困且死奈何坐視不恤儻獲罪吾坐之其有病者以私財為致醫藥為糜以食之不幸死則給棺槥卜爽塏收葬之民賴以全活不勝計恩及境外矣蓋其志在為民凡所興為必欲利及久而所濟廣者蓋如此與人言如恐傷之待僚屬未嘗失色然內剛正不可犯尤嫉贓吏壽春屬令有貪墨聞者既廉問審實一夕追逮證佐盡得姦贓令窘急賂當途致書營救公不答卒使引疾解印綬去諸邑為之竦動始公先達為侍從前少宰吳公敏故右丞許公景衡未顯公識其逺到舉以自代三公繼登冢輔時論隱然服公知人胸中恢廓而謙恭執禮一于純誠不為纎芥矯飾遇人無貴賤小大至胥徒臧獲語必拱手自名雖宴處私室家人不見惰容和裕有體至于臨事則斷不回于嗜好淡然略無珍玩財物視猶糞土雖身處冨貴自奉簡薄殆有布衣所難者慈孝友悌蓋其天性宗族內外四百口服公之化閨門雍睦無間言溫良謙遜有萬石君家風位侍從二十年所得恩澤以先弟姪季弟安仁以太碩人所鍾愛遇之尤厚憐其場屋困躓首以大禮恩奏補其後早卒諸孤幼稚撫養加意不異己子暨長為畢婚嫁躬與日者往來山谷間卜地營葬訖事喜甚曰吾今而後無復他念矣暨屬疾無甚苦謂家人曰吾其止此乎臨終之夕猶誦漢書且命區處為翌日親朋燕遊之會既就枕覺風昡起坐命藥繼至而亡其好學達理髙明令終死生之際不惑也如此嗚呼母宋氏纍贈太碩人娶張氏朝奉大夫親賢宅博士時敏之女封碩人生子男二人長曰讜承務郎前蔡州監稅克有家學次誥女一人歸修職郎林待問孫男三人尚幼公蚤與兄舍人從當世先生長者遊深得中庸大學指歸故能以其所學發為事業致身侍從當巨姦朋邪傾亂朝政持一介孤忠力排抵之僅以獲免後雖厯位禁闥俄值斯人復進用事勢熖赫然度不能抗因懇丐外補自是十有六年終老于外雖仇怨銜之刻骨欲搜抉疵釁冀以中傷而卒不能避回宫祠優遊卒嵗處之泰然亦無慍色卷懷韜晦不肯為赫赫名真若畏人知者故其進退始終大莭而逆推夫所以用心殆未昜以窺其際也蓋其韞蓄浩浩湯湯用之誠有未盡彼暴露衒鬻者抑公之所細也耶公為文典重有法尤工五言晚更平淡渾然天成無斧斤迹有詩五百篇制誥雜文三十卷藏于家卜居南郭治第築圃盡湖山勝槩益喜賔客至則觴詠延欵無斁暇日杜門觀書味道養性或携杖課園丁畦蔬蒔果以自娛嬉當其心間意適雖田夫野老亦欲與之對非所喜則位貌崇貴扣閽弗見也故識者論公平生出處以方唐太傅白公至其夷曠淡泊無聲色之娛文詞雅正不為纎豔浮華之語則又未可以優劣論也公于嘉言為父執行世中表姻舊且同里知公為詳然公潛德隱行所不能窺者蓋多姑實録所聞少備採擇之萬一承議郎新通判舒州薛嘉言狀給事集卷五
