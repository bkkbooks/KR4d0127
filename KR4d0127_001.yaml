body:
  text: 給事集卷一宋劉安上撰詩五言方潭展墓示子姪舊菴在山頂去此五里餘創謀自吾祖遷就今所居往時僧不多茍且完室廬至于五十載風雨荒榛蕪先人樂溪山每到常躊躇深憐棟宇弊締搆新是圖鑿岩闢幽徑開門挹清虛髙堂閎且深三山列庭隅或襌或教律濟濟蹌衣裾先塋舊所卜乃在西南隅松筠老且荗雲氣時卷舒政和甲午嵗豫解壽春符寬恩得真祠展省來郊墟清酹奠墓隧誥軸焚金朱報效未云訖涕泗徒漣如朅來就堂宇㑹飲族屬俱夜深燈火眀山靜竹柏踈翻思昔日營似為今所須先人篤好善雅志在詩書于公有隂德髙大其門閭虞詡名升卿其後果不誣嗟豫沗厥修覆敗良可虞作詩以自警其無迷厥初嵗寒亭兹亭豫所作再到異疇昔江梅老半枯檜柏春逾碧昜名為嵗寒表此蒼翠色森然一徑幽步屧時取適清漣亭泛舟髙樹環清池波平春正緑移舟近南岸倒影見華屋危梁屬修徑幽思生遠目更登狎鷗亭可以忘寵辱西齊雜詠六首葵花物性不可奪葵藿傾太陽為臣兹取節萬古有餘芳檜蔚蔚傲霜葉亭亭緑池畔莫言盈尺材要是凌雲幹竹繁枝喜刪除徑節見獨立灌溉未踰浹新筍已戢戢冬青得名固不誣對植近庭廡葉落帶寒烟花繁泣微雨菊移根近軒墀不使衆草沒㑹見黃金英泛我杯中物石斛鑿石空其中貯水凡幾斛淵渟或可鑒童子慎毋觸萬田道中水濶疑無路雲深僅有山兒童划小艇出沒稻塍間方潭飯飽雲岩粟茶甘碧澗泉我來無一事危坐聽山蟬花靨鎮二首下蔡嬉逰地春風萬杏繁誰家堪繫馬青壁竹籬門花靨誰名鎮梅粧自古傳家家小兒女滿額㸃花鈿長溪建善寺四首繡谷堂山谷誰能繡華堂得此名春風無轍迹紅紫自敷榮龍湫亭亭中一杯水澄泓如有容不因求得雨那信有神龍燕庵已涉艱危地方能處燕安人間不可忽須向靜中看白蓮堂瀟灑獻公房幽深古道旁山形半環小池面一奩方仙岩莊山勢從東轉河流自北來地幽饒水竹山逈少塵埃城郭居何遠舟船暮可回此中棲息穩懷抱一時開重九宴集天柱間皖國逢重九登臨搖落天盍簮追往事吹帽念前賢入眼吳萸紫開觴鄧菊鮮五雲亭最好爭奈近靈仙和胡子文逰山寺值雨偷間出城府聊以洗塵心自得林泉趣何妨雨霧深野亭連竹色古寺想潮音幸接髙人論清風滿素襟憶鸂䳵鸂䳵知何許南園春水多稻粱隨分有烟雨想無他世上貪毛羽湖邉足網羅池塘棲息穩慎勿厭風波又幸有春池濶雙雙戲晚暉庭間宜對立翅短莫髙飛寇賊已聞熄主人行且歸相將芰荷畔看汝浴紅衣獨逰竹閣極目盡天際風煙杳靄間水光清滉日野色遠連山白鹿今何在髙僧此獨間我今無伴侣乘興一躋攀宿方潭山中何所有一味靜難名暗谷流泉響踈林落葉聲夜深寒月白霜重曉鐘清早出松間路衣裘空翠凝贈釋達夫雲房依古城閴靜户常扄苦行人難及髙吟鬼亦聽望餘秋水遠定起暮山青世諦都無念逢人自說經和少伊同左經臣湖上作共訪招提去輕舟漾曉風水光雲影裏山色酒樽中邉戍今休卒吾生免轉蓬兹逰昔不與猶喜一篇同小飲南窗間徙倚風露已秋深晚色兼凉至浮雲帶日隂池荷欺碧玉籬菊暗黃金時序將遒盡翻驚壯士心茶院紫翠閣小閣面空濶下臨寒水清前山掛錦繡日落轉分明沙際小舟遠雲間歸翅輕我來看不厭佇立獨含情七言便齊芙蓉已過菊花殘獨有松筠耐嵗寒一榻蕭然無箇事獨看紅日上欄干登煉丹山三絶句攀援絶壁上髙峯下瞰塵寰杳靄中未飲刀圭跨鸞鶴已如身世脫樊籠神仙已往遺基在丹井凄清絶㸃埃歸去漏殘初睡醒恍疑身到洞天來羣峯聳拔更回環鶴駕分明縹眇間金鼎丹成人不見但留名字鎮空山德翬梅軒月下小酌踈影橫斜落酒樽誰知寒月上梅軒昔年山相棲真地我亦全家寄此村宿棲林三首誰知踨跡到桐山賴有禪僧數往還溪路水深行未得小窗幽閣總躋攀回首江鄉路渺瀰雨天行色倍遲遲最憐山寺留連日恰是清眀禁火時征鞍終日雨霏霏投宿棲林旋燎衣天意似憐行客倦放將紅日出岩扉建善即事三首繡嶺峯髙插晚空雨餘烟霧淡朦朧瓊枝細葉知多少最愛圑欒竹一叢春歸枝上餘花少轉午濃隂落滿蹊何事黃鸝語音好殷勤飛傍粉牆啼籜龍亭下知誰種旋見新篁破緑苔到此不知才九日抽梢今已過牆來𤣥沙二首軒窗髙下傍岩隈花木層層取次栽誰道山深春色晚等間桃李已齊開飛山髣佛如天竺環合峯巒一徑通何日再來亭上宿靜聽猿呌月眀中大中西庵借得西庵不似庵宛如蝸舍住城南晚來一盞亮功酒更薦棲林八寸柑硤石相對有項羽廟乘間驅馬向髙原楚漢遺基尚宛然堪憐項羽成何事占得淮邉屋數椽江村漁舍江邉茅屋被風掀雨打踈窗夜不眠催唤兒童五更起重添篾纜繫漁船晚步秋半凄然客思清杖藜何處暢幽情晚天風雨莓苔滑間傍欄干取次行出局紀懷國爾忘家是所先如何交搆競爭權霜臺白簡真可畏一日五公俱左遷蠟梅雙成送我蠟梅花夜靜幽香自一家疑是素娥來月下淡黃衣袂紫雲車宿桐城驛二首大農遺愛在桐川血食于今幾百年應想嵗豐秋賽日送迎歌舞獨喧闐桐溪古驛聞來久我到梅黃雨細時砌下流泉無復有空餘松柏覆簷垂即事江烟淡淡日落後山雨纎纎潮上初黃鶯引雛過林杪群雞就食喧階除澄源堂落梅如茵落英回旋雪飛餘誰向庭中細細鋪借與翠娥相應舞絶勝西蜀錦氍毺甘露亭涵碧軒前甘露亭暑天凉夕此間行琅玕一畝森如玉影入池心徹底清安豐道中二首陂渠積水與田通髣佛江鄉意趣同引起三吳耕釣興小舟來往藕花中水斛安排鏡面平菰蒲初種已齊生晚來雨過浮萍少看見魚兒作隊行舒州西門送客亭拂雲亭外竹千竿靜聽清聲戞玉寒却憶謝公岩下路水風凉處戰檀欒友人新居門向平湖靜處開雨餘山色入簾來連雲競秀千岩竹隔水飄香一徑梅觀裏紫芝元不老柱頭𤣥鶴幾時回此峯信是神仙窟子晉吹簫有舊臺登謝公樓分韻得心字髙峙危樓壓翠岑登臨遙想昔賢心人隨嵗月有興廢名逐江山無古今殘日汀邉生晚思斷雲簾外捲晴隂清風凜凜今何在芳草池塘恨獨深即事未尋南郭舊生涯且向淮壖太守家西圃學栽陶令菊後園時種卲平瓜民淳訟少看空圄吏散庭空聽報衙更得嵗豐多樂事宦逰誰復問年華寄叔靜頻年京闕暗胡塵竊發桐廬更駭聞食盡犬羊還自斃火炎螻蟻却須焚中原已有汾陽將二浙誰驅下瀨軍州郡雖嚴防守計可將知略佐忠勤和左經臣見過為愛端居上郡章里閭何幸得徜徉買田郭外春耕早築室湖濵野趣長且把舊書遮病眼了無塵事擾中腸故人訪我留佳句應笑年來兩鬢蒼荆溪有懷自從南郭得三椽怕趂荆溪半夜船每望白雲驚嵗月空將清夢繞林泉雖因追遠時來此又見登髙意慘然極目不知多少恨一聲孤雁夕陽天聖泉聞道東山有聖泉杖藜侵曉到山前一泓寒玉流無盡萬頃良田大有年茶鼎曉煎雲腳嫩齊厨夜引澑聲圓我來一酌磁甌去終日餘甘齒頰邉四月一日壽陽樓遇雨黑雲滃蔚自西來佇立危樓亦壯哉遠壑烟生千里雨寒潭龍起數聲雷田疇坐看還豐嵗里巷遙欣弭旱災慙愧外官逃吏責歸鞍何憚踏泥回和馮中丞中秋夜月捲盡浮雲見碧虛初傳更漏滴銅壺入秋爽氣逈然别此處氷輪何處無共想姮娥依桂魄獨憐飛鵲繞庭梧西園飲散歸來早不用紅紗照路隅又和十六夜月雲頭依舊尚團圓未覺清光有兩般自是人心重佳節故將今夕不同看望中銀漢祗如昨坐久園亭又更寒莫把盈虧妄分别一杯到手且須乾彈事論蔡京臣聞惟辟作福惟辟作威臣而有作福作威則凶于而家害于而國矣今負台衡之重而虧享上之忠挾震主之威乃貪天功以為己有履霜堅氷其可不早計而預圖哉臣昨者列班面奏宰臣蔡京罪狀數十條冒瀆宸聽未賜施行尚鬱公論京位極寵盛猶不知止弟子姻婭悉居要塗朋比奸邪布滿中外勢熖熏灼不可嚮邇內而庭掖小臣必其識拔以伺察陛下之動作外而藩維兵帥必其薦引以默制陛下之肘腋附己者榮進離己者退黜使天下皆知威福出于宰相之私門而不知有朝廷之命令况海宇綏靜初無間隙京納叛啓仇邀功生事釁結兵連天怒人怨迹其奸回雖擢髮不足以數纍起大獄陷及無辜株連旁逮煽惑國本幸賴聖眀不使滋蔓京今惡貫已盈奸狀具露欲望睿斷奮發乾剛大正典刑亟加斥逐以肅臣鄰以福宗社幸甚再論蔡京臣踈遠小臣䝉陛下簡拔擢置風憲義當捐軀以圖報稱今虺蛇當道蔓草日滋倘不力勦而痛芟寧不大違國是有負陛下之使令乎臣纍疏論列宰臣蔡京權重位危罪大惡極雖䝉俞允未即顯誅以孚天人之心以慰夷夏之望臣不避再三之瀆披瀝血誠仰干天聽三省事務必繇聖斷京不候奏擬徑行批下擅作威福鋒不可攖此京之罪一也京輔陛下紹述首紊憲章文昌舊省乃先帝睿畫京惑于隂陽之說一毁為墟此而可忍孰不可忍此京之罪二也謀動邉釁舉師黔南妄言開拓疆土悉掩以為己功邉陲雕耗民不聊生此京之罪三也錢鈔本自流通京乃朝行夕改商販不行棄妻鬻子或致自經而斃民吾赤子何忍重困之此京之罪四也國家名器京乃盜以市恩汲引凶姦少年結為死黨此京之罪五也興株連之獄必羅織以成之掩衆正而盡誅冀以鉗天下之異議此京之罪六也臚傳賜第京乃摘其語涉諷己者編廢二十餘人此京之罪七也交結宫闈私通近習京賴此曹以為耳目公肆誕謾若掩日月而蔽之此京之罪八也託祝聖以營臨平之私域假利民以決興化之䜟水此京之罪九也孟翊獻昜而京與之官卒以姦妖而敗張懷素為京之密友終以惡逆而誅此京之罪十也凡此十罪皆冒重辟况積惡稔姦未容一一殫述豈得偃然于具曕之上哉雖陛下體貌大臣保全終始未賜誅竄其如縉紳惶惑生民嗷嗷陛下豈得忘宵旰之憂而不為社稷無窮之慮也臣愚欲望陛下檢㑹臣前後所奏斷自聖心亟加竄殛臣螻蟻至微倘一言有補于萬分雖斬臣頭以謝蔡京斬京頭以謝天下臣死之日猶生之年論蔡崈臣近纍論前給事中蔡崈罪惡顯著伏䝉聖慈開納罷崈職任俾領宫祠然尚帶提舉叨綴從班士論喧然未以為允臣職當彈紏宜思報補不敢默默臣竊惟延閣之職本以旌寵才學文行之士琳宫之任本以優假勤勞王家建立事功之人崈市井賈販之徒未嘗學問字多不識每上章疏取笑縉紳則何嘗有學交結豪民以規厚利干求進用形于簡牘無異于登龍斷而鑽穴隙者則何嘗有行起自布衣驟躋禁塗從容瑣闥僥冒寵祿則何嘗有勞居論思之地曾無小補唯以道家吐納為說則何嘗有功臣以為延閣華資真祠逸任皆非崈所宜處陛下雖優容而公議未厭何可得也况崈妄自尊大上輕君父侍立瞑目不恭之罪莫大于此義難寬貸若尚留京師臣恐招權怙勢隂計邪謀密侵國論有害治體此有識者之所深憂陛下所宜留神詳察者也伏望睿斷降出前後章奏證崈之罪重行黜責以協公議奏議論堂除臣伏見元豐中內外舉官立為選格付之有司搜括差注勞績居先孤寒獲進方是時人心悅服升黜無辭以天子成法守在有司而人無幸進近日堂除差遣比之舊制下侵吏部員闕甚多銓曹艱于注擬平進實多滯淹至如縣令改官必兩經作縣宣勞既久檢身無過僅得關升通判及至到部本等差遣無由注授復又作縣有實厯通判合關升知州又復作通判名為關升其實暗落資任臣恐非所以慰首公之吏憫年勞之臣也銓曹既艱往往習為奔競干請權貴茍得無耻有位者因得鬻權私其好惡更相請託紊亂官常啓幸曲之私扇澆浮之風莫此為甚蓋差遣既收之堂除則銓曹之路必狹銓曹之路既狹則請謁之門必熾臣愚欲望陛下特賜詳酌內外官堂除有可罷者宜歸于吏部而復用元豐選格有司一以法式從事則公正之塗闢干請之風絶其于聖化誠非小補劄子辭免除中書舍人凖尚書省劄子除臣中書舍人令乘遞馬發來赴闕者聞命震驚罔知所措竊以代言之職選任惟艱不專潤色訓辭蓋亦與聞幾政自非宿望曷可冒居伏念臣稟性迂踈誤䝉簡擢躐居憲府進陟諌垣每圖報稱終誓捐糜職在紏彈身不顧恤雖羣邪之交搆賴上聖之照臨臣適值內艱痛纒風木分甘逺屏跡寄邱樊俄奉除書俾司詞掖自量固陋將曠敗之是虞况積愆尤必煩言之交至兼臣自罹憂患無望生全免喪方新宿疢間作若冒榮寵必速顛躋欲控愚𠂻仰干聰聽伏望聖慈特降睿㫖收還渙號俾臣少安愚分實出天地大造乞外任輒瀝懇誠上干天聽退量僣冒俯俟嚴誅伏念臣猥以非才誤䝉奬用擢司憲府思罄愚忠逮長諫垣益增罪戾旋銜憂而去國宜擯棄于眀時忽拜除書俾領掖垣之命曾考勞效更升瑣闥之嚴念與世而多違每自慙于無補蓋緣臣昨罹憂患以來心氣衰耗稍加思慮輒復昏憒方陛下循名責實勵精庶政之時竊恐有誤任使亦必洊被人言兼臣自初改官不厯州縣民事素不諳習伏望俯加憐憫除臣一外任差遣庶幾完養之餘稍更事任誓圖糜捐少答恩思給事集卷一
