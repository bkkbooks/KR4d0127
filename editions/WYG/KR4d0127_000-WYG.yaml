body:
  text: 給事集目録别集類二宋巻一詩彈事奏議劄子巻二外制巻三表啟巻四策問記墓銘頌銘偈祝文祭文巻五經義附録臣等謹按給事集五巻宋劉安上撰安上字元禮永嘉人紹聖四年進士丙科由錢塘尉歴擢殿中侍御史疏劾蔡京不報乃與石公弼等廷論之以劾京之故浮沈外郡者十六年晚以知舒州乞祠得提舉鴻慶宫靖康元年致仕建炎二年卒於家其平生風節甚著葢亦伉直之士據薛嘉言作安上行狀稱其有詩五百首制誥襍文三十巻篇帙頗富然焦竑國史經籍志載劉安上集實止五巻與此本相合葢兵燬之餘後人掇拾而成非其原本矣至宋史藝文志載安上文集作四巻又與此互異則當由刋本訛五為四耳其集自明以來流傳甚尠朱彛尊自潁州劉體仁家借抄僅得其半後得福建林佶抄本始足成之其詩醖釀未深而格意在中晚唐間頗見風致文筆亦修潔自好無粗獷拉襍之習葢不惟其人足重即文章亦殊可觀也乾隆四十一年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:50383914539a7d5486b1bd00dc133c938a37e8faef1a53e4442b1f50c9b9c97b
