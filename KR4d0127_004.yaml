body:
  text: 給事集卷四宋劉安上撰䇿問一韓愈讀孟軻書然後知孔子之道尊聖人之道昜行也今七篇具存學者服膺而讀之孔子之道何如其尊乎聖人之道何如其昜行乎學者同是堯舜同尊孔孟雖五尺之童知之也宰我曰夫子賢于堯舜逺矣堯舜聖之盛者也孔子果賢乎或曰門人之私言也以為私言孟子何取焉孟子曰伯夷伊尹栁下惠皆古聖人也乃所願則學孔子孔子與三子者班乎孟子獨學孔子何也學者學為聖賢者也不知所以為聖賢而學也寧不謬用其心乎願聞其説二聖賢難知久矣自非聖人不能深考而詳辨之子貢方人子曰夫我則不暇孔子非不能也蓋難之也昔孔子稱堯之文章舜之無為禹之無間然皆不言其聖太伯之德文王之文周公之才伯夷叔齊栁下惠之賢咸有稱述而各不同孟子稱伯夷叔齊桞下惠皆古聖人也稱孔子則信宰豫之言以為賢于堯舜稱禹稷顔回則曰同道孔孟所稱其有異同否西漢揚雄議論不詭于聖人而漢之將相咸述品藻東漢班固博極群書至論古今人則别為九等二子去取與孔孟異乎否也諸君學古久矣試考聖人之所以推稱二子之所以優劣者如何三天下未嘗無材也作而成之材不可勝用矣周之盛時求賢用士處之以宜文武政事之材出焉詩曰濟濟多士文王以寧此其效也天縱上聖聰明日躋厲精圖治求賢如不及比詔大臣博訪人才因事審用處文學之士于儒館置幹敏之士于寺監求心計之才于漕臺養智勇之人于將帥可謂得養士用人之道矣然承平日久四方之士雲蒸而雨至榮路既廣競進者衆賢否未眀真偽難别論辨之必有其方也或沉于下僚或隱于遐逺無以汲引之卒困于無聞薦延之必有其道也人材不同遇事乃見槩求其全則賢或有遺拘以常格則用或不盡奬厲之必有其術廊廟議之熟矣諸君平居討論亦及此乎願聞其説四綱紀法度所以維持防範不可一日廢也主上大智深明厥理旋乾轉坤闔闢萬化緝熙既已大備告播罔不是孚猶以為未也親灑宸翰申戒有官持循兢兢形于詔令豈不以今日先務有在是乎乃者協賞罰明法令嚴分守因官以察治因事以訓飭異論者息貪鄙者化侵紊衝革者不得作可謂得持守之道矣于斯時也是冝丕應徯志同寅協恭率職趨事以躋極治然而侵令玩法狃于故習以干有司者尚時有之其故何哉今欲內外小大之臣四方萬里之逺皆能體上之德恪遵成憲謹守常彛毋紛更是圖毋茍玩是習不待勸沮咸迪有功法令憲章永永無弊其尚何術以臻此歟諸君被教養懷經術習治體久矣願詳陳之將以其説獻焉記望思亭記某生十有九年先人奄棄諸孤業守緒餘能自樹立雖不辱其身每念不及一日之養未嘗不追痛殞絶也及濫吹于朝偏親垂白既懼且喜方以出入言路奉職唯謹而又不及朝夕之養亟欲請外以伸烏鳥之情天降酷罰夫人即世某銜哀茹荼扶杖護送歸以終竁事實荆溪余奧山之原去先人之兆一里而近從先志也夫合葬雖後世所尚然謂之古則不可故後世有不合葬者世或未之罪也先人葬方潭山丙地山小而狹舊不為壙今將竁而合之或撓動其神靈毁傷其林木于小子安乎余奧距方潭山矗矗相望也廬居于山之下作亭于巔名之曰望思左乎髙祖之所葬也右乎先兄之所葬也登斯亭也若祖若父顧盼之間靡不畢見既而望而悲悲而思愀然省厥躬其不忝前人乎則廬居之間不待訓諭告戒與夫座右之銘矣矧豫憂患之久重以頑暗若不愓厲何以奉承大訓經曰無念爾祖聿修厥德又曰夙興夜寐無忝所生嗚呼小子可不念哉可不念哉亭去夫人墓五十二步建于既葬之年五月二十三日記書方潭移溪事余遊方潭昔日力不繼每至輒去戊戌冬至後三日宿寺中步自橋而北觀新築堤岸與浴堂後基址纍石捍溪堅緻逾十數丈用工不數十人慨然歎曰圓淨師以修造作佛事人所不及鑿引水渠田疇加闢回溪昜流基址增廣他日方潭僧益衆屋宇益廣供膳益給誰之力歟先長史締創于前圓淨師復培緝于後實無窮之利後人可不知所自乎故書以遺其徒使刋諸石政和戊戌十二月初六日墓銘從弟元素墓銘元素豫叔父第二子也宣和癸邜以鄉薦赴試禮部甲辰三月不幸卒于京師建炎改元十二月庚申葬于其縣仙桂鄉方潭院之西從兄徽猷閣待制某臨送山原為之銘曰吾兄元承有弟元素安禮其名宣義其父兄官河東元素實從左右是依問學從容羣書博觀繼以編纂口誦心記浹洽貫穿覃思既精吐為華英爰列薦書士友以傾宣和辛丑睦冦嘯聚浸淫鄉邦官吏恐懼劉公士英紏合義兵除器峙糧分部扞城元素忠勇長揖守帥贊以方略佐其大計羣盜果至城堅叵當林松伯髙記之甚詳元素倜儻篤于風義赴人急難不顧其已惟鮑商霖病于京師詗候闕然獨往視之歸得寒疾遂不可治嗚呼哀哉鄉喪善士家失令子人之云亡邦國殄瘁我在夀陽聞訃震驚使加數年學就業成升于王朝為國俊英今也已矣言之涕零荆溪方潭山水竒秀爾父伯叔環葬前後元素從之實志之舊建炎改元歲在丁未維丑之月窀穸是事早婚于吳中道不偶以仲氏子昭孫為後享年幾何三十有七白首偏親追念曷畢仲氏孝友厚其送終拊親幼孤實與已同我作銘詩以閟其藏於乎萬年泉室有光頌頌堯在昔明聖曰堯舜氏黃屋非心唯天我視堯有天下不私其已舉以授舜猶棄敝屣天下四海不頌其美舜以禪禹禹以命子傳夏之歷八百其祀天下四海不訾其鄙堯禹異趣其歸一揆道德之公精神之至維時淳厚異議不起後世囂薄紛紜披靡簞食豆羮與者見色得者私喜而况舉國推以豫人天下不駭者寡國不明智士不養氣上下一律惟已自利大道之公淪沒垂地嗚呼巍巍大哉唐虞氏之風實聖賢之髙軌銘誠齋銘先妣傾喪築室墓下榜曰誠齋作誠齋銘彼荒者廬豫昔所苃僅蔽風雨茍完歲月唯誠則存不誠無物勉哉厥修沒齒勿輟二齋銘豫罷官東陽築室城南作耘齋溉堂以為燕居之所因作二銘以自警耘齋地不在廣方寸實同惟情為田耕穫乃功昔為校官耘人之苗今也退休自耘其疇田耘伊何芟夷蘊崇稂莠不生嘉榖乃豐固我靈根存我夜氣太和保合蒸為美瑞不然戕賊荆棘之地非天爾殊爾則自棄銘于座隅庶免蹈之弗克念兹小人之歸溉堂凡物之生雨露是資彼生者天人則相之曰嵗大旱一溉何益溉而不輟豈不為力後枯之理夙夜斯得伊豫早衰外嗇中乾豈無靈液自涸其源至人葆真吐納為最譬如植物雨則茂遂亦曰天醴飲其醇和暢乎四肢惟顔之酡我銘斯堂訂豫之迷欲成厥功戒之在虧偈山中四偈豫廬居山中期年鄰之父老遺以花卉藥果雜植亭之左右以備採掇服食幸不滅性作山中四偈花蹊彼芳者華乘時敷榮革其焦枯爰變丹青畹蘭之秀嶺梅之英雜植旁羅别狀異名孰使然哉自色自形理可以燭學可以明桃李不言蹊徑自成竹徑緑竹猗猗如璧如玉如衛武公在彼淇澳其徑挺挺其髙矗矗剛不可折榮不可辱虛不可實直不可曲夏不受暑冬不變緑蕭蕭其隂清爽絶俗今雖未多來者可續鞭萌繁滋渭川在目藥圃彼藥多品州土各異甘苦既殊莖葉或類桐君所編神農所記謾不可考真偽孰是維此遐邑地偏多厲服食所資自逺而至厥壤攸出封殖宜閟英華紛敷根實茂遂採擷必親杵臼爰備攻疾蠲痾惟勤服餌欲見竒功驗所嘗試蔬畦彼嘉者蔬于山之下棊布可觀區分如畫引溜灌溉不捨晝夜擢本後先更王迭霸紫芥耐冬白菘宜夏其甘逾瓠其美勝蔗豫方蔬食每掇盈把烹肥擊鮮夫我不暇抱甕灌畦率先園者祝文登州告先聖朝廷方興崇學校郡縣內外奉王之制罔敢不肅維兹殿宇閲嵗之久塗塈頽落廟貌不嚴不足以妥神之靈今涓日之良昜桷與瓦徹而新之以稱眀天子所以欽祀之意惟王其鑒壽州謁先聖某以諸生擢由學校今被命于朝來守兹土學道愛人敢忘吾先聖之訓涖事之始不敢不告諸廟維神以休烈廟食兹土雨暘時若民受其賜蓋亦久矣某被命出守爰初視事賴神之休自今其始惟神監之敢忘昭告天齊廟維神以靈惠垂庇一方民所瞻仰其亦久矣某被命守土爰初視事賴神之庥自今其始惟神鑒之敢忘昭告社稷維神以休烈垂祐下民生殖之功萬世永賴某被命守土涖事之始率諸常事敢不祗謁祈晴耕耨既修方冀來年之瑞霖淫繼作不無水潦之憂輒控微誠仰祈眀貺伏願上靈降鑒休證來臻消隂沴而應時赫陽光而普照豐年可望庶類均歡淮源王某被命出守爰初視事問民疾苦皆以為瀕淮之民恃麥以生去嵗麥幾成而水害之今麥欲秀而雨不已吏民惶懼不知所為其何以供稅賦奉神明之祀乎惟神實庇一方民所依賴刺史失職當被譴責彼民何辜神獨不憫焉躬率羣僚奔走祠下惟神鑒之祭文祭范忠宣公嗚呼公乎惟公烈考慶歷名臣歿十餘年公名復振治平之初召為御史惟帝曰吁文正有子爰及熙寧進公諌垣公曰用我知無不言先天下憂後天下樂公惟似之不叛其學二聖臨御圖任老成公歸西極四方敉寧帝曰汝賢引登輔弼公不茍安踰嵗而出公之出處為時升降去國五年帝復用公公初在朝非堯不陳于蕃于宣一于愛君紹聖初政出居宛邱抗章極言朋黨是憂惟時謗誣讐怨畢斥諸公南行恩典廢格公曰不可貽國後患冝因赦原聽其自便公言一出人為公危公則泰然言非我私今上嗣位眀燭萬國惟公皤然起自謫籍上趣入覲曰留相豫公以疾辭其來徐徐公休于家問勞洊至冀公少康以佐天子天不憗遺公訃遽聞縉紳咨嗟故老涕顰嗚呼公乎仁祖及今五聖百年惟公世家以忠義傳父子兄弟一門俱賢危言正論讀者潸然臨歿之章一何切焉某戅愚不敏舊辱公知提携振拔俾聞于時今公云亡欲報曷追西望輀車綍紖莫持寓辭千里侑此一巵祭黃右丞惟公懿學美材蔚于時望嘉言讜論簡在三朝裕陵超置于憲司哲廟擢登于政府歷時既久經德不回肆真人之作興越多士而進用未踰嵗月乃以疾聞力請宮祠旋歸故里章所上者六七詔趣召者再三雅意本朝老而彌篤乃心王室歿且不忘夫何驅馳才及于近郊而奄忽俄臻于大故僚寀興云亡之嘆淵𠂻軫不憗之悲某久辱誤知適當言路趨風方邇去德猶新豈知嵗月之間遂作九原之隔聊陳薄奠詎盡誠悲祭丁包蒙惟靈稟天資之異常企前修而為志潔􅋵履之無玷坦襟懷而樂易自郡計之五上信行能之已試視科第以俯拾偶澤宫之未利方援此以有請遽被誣而下吏念橫逆之來集誠古今之異事嗟造物之頓挫實伊人之私意罄多士以懷怨豈豫親之獨議自去嵗之東下欲投觚而操耜期閉户以自樂俄執經之如市悵講席之未暖嘆沈痾之驟至攬遺墨以尚濕驚銘旌之已植嗚呼哀哉昔先子之捐館惟一女之醇懿擇良配以付託實伊豫之兄弟念久之而未獲既得公而極慰匪冨貴以皇恤期偕老以卒嵗何中路之蹉跌忽如川而先逝兹孤幼以滿堂藐餘生之誰寄將修短之前定非人謀之能致嗟彼蒼之謂何痛斯人之殄瘁閟聲容之杳然願再瞻而莫遂陳薄奠以敘哀神來舉兮斯觶祭亡兄左史惟我與兄總角相從後來出處未嘗不同鼓篋帝京跨嶺涉江留滯韲鹽燈夜雨窗間關百試志莫肯降獲聨優最奏對宸楓載念西遊擔簦于洛依歸夫子覃思力學格物致知會方守約惟兄蚤達立有所卓視彼衆人允矣先覺不鄙踈庸提誨磨琢濫吹同升得官于朝西掖瑣闈揣分實叨兄由烏府記言螭坳人謂子榮豫憂方膠蓋豫二人憤邪疾叨羣隂以目其能一朝豫丐補外領郡壽春兄守鄱陽抗章力陳再易于宣篤勤為民天災流行夜寐不伸救療旁午活此州人兄俄奄逝嫂亦殞身夭禍盈門天何不仁萬口盡傷當路以聞淵𠂻軫悼褒典疏恩嗚呼哀哉追念疇昔恍如一日或升或沈靡曾棄失今乃獨先顧影孰匹雙旌翩翩飄風瑟瑟豫繫州組追送不克天實臨之監此悃愊薄奠道周老淚泉激祭張宗博惟兄沈識偉器見于夙成蚤擅辭華領袖後生旋宰劇邑治煩有聲受佐大府朅來帝京親賢宗藩公談是程優遊靜退利徑靡爭有識咨嗟躁進革情謂公見知臺省飛纓云胡不淑禍患相攖綿延纍載竟殞厥靈嗚呼哀哉如何不肖舊辱公知館我甥室時方布衣提携剪拂繆列金閨非公之賜何以至斯昔公罹艱逺歸海涯我亦去國假守淮西相望天末江湖渺瀰孰謂數月公訃遽來聞問驚怛肝膽沸糜罷斥來歸公喪在堂入門望帷涕泗已滂嗚呼哀哉謂才必達公乃困厄謂仁者壽公壽不多悠悠蒼天曰如之何公有令子克紹厥緒公今云亡豈復兹慮惟我鈍頑凛凛危懼厚德不報尚期末路敢以菲薄恭薦情素冀公不昧歆此奠爼祭張宗博夫人夫人生長于永嘉而卒葬陶山蓋從其先舅姑之兆域亦其平日志意之所安者也禮婦人不及事舅姑謂之不幸今也生則逮事死焉從之嗚呼夫人可以無憾靈輿啓行徑趨殯所日月不逺以待大葬道路瞻視罔不嗟嘆矧乎至親悲痛何極聊陳薄奠詎盡哀誠代祖母祭八叔惟我長史兄弟三人叔氏之後唯汝獨存汝于諸房既長且賢顧我獨存情均至親嵗時問勞有味其言豈無他人莫如汝勤嗚呼吾宗繄汝克敦唇齒相依枝葉附根吾老已衰爾才六旬冀汝康寧以庇弟昆如何不淑乃棄而先吾孫罹憂自京而旋汝犯霜雪迓于江堧得疾而歸謂宜少痊曽不浹旬遽隔九泉命也天只莫知其原寓哀以辭薦此芳尊祭十七嫂方氏嗚呼先兄之亡十有九年惟我令嫂送往事存鞠育二子逮其諸孫至于有成實艱且勤念昔宦學兄當我門道路裹糧悉出厚恩嫂實相之絶口不言我婦來歸教誨周旋雖曰娣姒如弟妹焉究觀施為豈不曰賢云胡南來避地秦川不幸得疾藥石弗痊神識奄忽遂歸九泉嗚呼哀哉生死修短厥數在天雖云異鄉如鄰邑然魂魄流行往還不難旋館于兹神其少安音容永違日改月遷一奠靈帷摧胸裂肝祭十八嫂朱氏嗚呼為士去其鄉而遊學四方非得兄弟經其家豈無養親之憂有兄弟者又必得夫人之賢助其內治然後兄弟得盡其愛某愚不肖初離鄉井兼有此二者今也不幸學未得伸其志而夫人棄去以失吾賢兄之助其為痛傷抑可知已敬陳薄奠伏惟尚饗正議贈朝議大夫燎黃某愚不肖年未及冠遭罹孤苦賴先人積善之慶不殞其躬竊食于朝天子哀其祿不及養每遇大禮疏恩仕籍輒下告第之制加褒贈之寵所以推恩廣惠以為臣子之勸也政和丙申冬祀圜壇則有朝請郎之命政和丁酉大饗合宫時則有朝散大夫之命至政和戊戌誕受九寶則有朝議大夫之命凡三嵗于兹疊被寵渥朝廷之意厚矣惟靈上體至意受此顯命以庇我後人某亦敢不夙夜自竭圖報萬一以永我先人休德謁先祖長史墓賴皇祖之大庇竊祿京師逮今七年比遭酷罰扶護還舍未即殞滅敢忘展省惟靈其享之謁先考正議墓賴祖考庥庇竊祿京師違逺松楸逮今七年天禍我家先妣傾喪日月不居奄經卒哭號天叩地哀痛罔極茍延殘息扶護歸葬未即死滅不敢不祗見墓下嗚呼哀哉謁十四叔墓某自幼時蒙被叔父教誨爰以誤恩竊官于朝德厚賜深未知報稱違去五載叔父不幸捐館某貪戀榮寵不克謁告以歸今以禍罰還家叔父之葬已更嵗籥其為悲痛尚復何言薄奠薦誠有淚如雨嗚呼哀哉謁十七兄墓自昔兄長既克大葬某踰月即為蓬萊之行違去松楸經及七載竊官于朝濫綴班列兄賜實多久欲歸省墳園志願未遂今天降禍先妣喪亡日月不居奄經時序號天叩地哀痛何極茍延殘生以畢大事未即死滅不敢不展謁墓下嗚呼哀哉給事集卷四
